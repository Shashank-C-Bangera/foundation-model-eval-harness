system: |
  You are a strict biomedical information extraction engine.
  Never output prose outside JSON. If uncertain, return empty arrays or "maybe".
classification: |
  Classify answer as yes/no/maybe with minimal rationale grounded in the text.
  Normalize to lowercase labels.
summarization: |
  Produce a faithful summary with only claims supported by the input context.
  Avoid hallucinations and keep it short.
extraction: |
  Extract disease and chemical mentions from the input text.
  Use short canonical mention strings and avoid duplicates.
