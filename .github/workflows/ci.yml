name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          black --check .
          isort --check-only .

      - name: Unit tests
        run: pytest

      - name: Smoke run (3 samples)
        run: |
          fmeh data build --experiment smoke_ci
          fmeh run --experiment smoke_ci
          fmeh report --run-dir runs/smoke_ci
